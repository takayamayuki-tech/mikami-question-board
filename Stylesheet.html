<style>
  :root {
    --bg: #f5f6f8;
    --surface: #ffffff;
    --surface-muted: #eef0f4;
    --border: #e3e6ec;
    --text: #1a1d24;
    --text-muted: #5a6173;
    --primary: #2a6df4;
    --primary-hover: #1d57d1;
    --primary-soft: #e5edff;
    --success: #18a957;
    --success-soft: #e5f6ec;
    --warning: #d97706;
    --danger: #d63a3a;
    --answered-bg: #eceef2;
    --answered-text: #6a7180;
    --shadow: 0 1px 2px rgba(16, 24, 40, 0.06), 0 4px 12px rgba(16, 24, 40, 0.06);
    --radius: 12px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', 'Meiryo', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Header ===== */
  .app-header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    backdrop-filter: saturate(140%) blur(8px);
  }
  .header-inner {
    max-width: 980px;
    margin: 0 auto;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .title-block h1 {
    font-size: 18px;
    font-weight: 700;
    margin: 0;
    letter-spacing: 0.01em;
  }
  .subtitle {
    margin: 2px 0 0;
    font-size: 12px;
    color: var(--text-muted);
  }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .status {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ===== Buttons ===== */
  .btn {
    appearance: none;
    border: 1px solid transparent;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease, transform 0.05s ease;
    font-family: inherit;
  }
  .btn:active { transform: translateY(1px); }
  .btn-ghost {
    background: transparent;
    border-color: var(--border);
    color: var(--text);
  }
  .btn-ghost:hover { background: var(--surface-muted); }
  .btn-primary {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }
  .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
  .btn-success {
    background: var(--success);
    color: #fff;
    border-color: var(--success);
  }
  .btn-undo {
    background: transparent;
    color: var(--text-muted);
    border-color: var(--border);
  }
  .btn-undo:hover { background: var(--surface-muted); }
  .btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  /* ===== Layout ===== */
  .container {
    max-width: 980px;
    margin: 0 auto;
    padding: 20px;
  }
  .board { margin-bottom: 8px; }
  .board-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
    margin: 6px 4px 12px;
  }
  .board-header h2 {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin: 0;
  }
  .count {
    display: inline-block;
    margin-left: 8px;
    background: var(--surface-muted);
    color: var(--text-muted);
    border-radius: 999px;
    padding: 2px 9px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .hint {
    font-size: 11px;
    color: var(--text-muted);
    margin: 0;
  }
  .divider {
    border: none;
    border-top: 1px dashed var(--border);
    margin: 24px 0 16px;
  }

  /* ===== Cards ===== */
  .cards {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    box-shadow: var(--shadow);
    transition: opacity 0.25s ease, background-color 0.25s ease, border-color 0.25s ease, transform 0.25s ease;
  }
  .card-top {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px 12px;
    margin-bottom: 8px;
  }
  .card-top .name {
    font-weight: 700;
    font-size: 15px;
  }
  .card-top .realname {
    font-size: 12px;
    color: var(--text-muted);
  }
  .card-top .timestamp {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .badge-yes {
    background: var(--success-soft);
    color: var(--success);
  }
  .badge-no {
    background: #fbe5e5;
    color: var(--danger);
  }
  .badge-other {
    background: var(--surface-muted);
    color: var(--text-muted);
  }
  .card-body {
    font-size: 14.5px;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text);
    margin: 8px 0 14px;
  }
  .card-actions {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 8px;
  }
  .answered-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-right: auto;
  }

  /* Answered look */
  .card.is-answered {
    background: var(--answered-bg);
    border-color: var(--border);
    box-shadow: none;
  }
  .card.is-answered .name,
  .card.is-answered .card-body { color: var(--answered-text); }
  .card.is-answered .timestamp,
  .card.is-answered .realname { color: var(--answered-text); }
  .card.is-answered .badge-yes { background: #d8e5dd; color: #58756a; }
  .card.is-answered .badge-no { background: #e8d8d8; color: #856060; }
  .card.is-answered .badge-other { background: #e0e2e7; color: var(--answered-text); }

  /* Highlight when card is just moved */
  .card.flash { animation: flash 0.6s ease; }
  @keyframes flash {
    0% { transform: scale(1.0); background: var(--primary-soft); }
    100% { transform: scale(1.0); background: var(--surface); }
  }

  .empty {
    text-align: center;
    padding: 28px 12px;
    color: var(--text-muted);
    font-size: 13px;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
  }

  /* ===== Toast ===== */
  .toast {
    position: fixed;
    left: 50%;
    bottom: 24px;
    transform: translateX(-50%) translateY(20px);
    background: #1a1d24;
    color: #fff;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    box-shadow: var(--shadow);
    opacity: 0;
    transition: opacity 0.2s ease, transform 0.2s ease;
    z-index: 100;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast.is-error { background: var(--danger); }

  /* ===== Responsive ===== */
  @media (max-width: 600px) {
    .header-inner { padding: 12px 14px; }
    .container { padding: 14px; }
    .title-block h1 { font-size: 16px; }
    .card { padding: 14px; }
    .card-top .timestamp { margin-left: 0; width: 100%; }
  }
</style>
